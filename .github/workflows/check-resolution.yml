name: Daily Player Resolution Check

on:
  schedule:
    # Every day at 6:00 AM UTC (midnight CST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  check-resolution:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No npm install needed — script uses only Node built-ins (fs, path, fetch)

      - name: Run player resolution check with auto-fix
        env:
          PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
        run: node scripts/check-player-resolution.mjs --fix

      - name: Run rotating weekly batch (Mon-Fri covers all ~1000 players)
        env:
          PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" -ge 1 ] && [ "$DAY" -le 5 ]; then
            echo "Running batch $DAY of 5..."
            node scripts/check-player-resolution.mjs --batch "$DAY" --fix
          else
            echo "Weekend — skipping batch run"
          fi

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/players/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push fixes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/players/
          git commit -m "fix: auto-update player team data from PandaScore

          Automated daily resolution check detected stale team assignments
          and updated them to match current PandaScore data."
          git push
