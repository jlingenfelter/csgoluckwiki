name: Refresh Prices

on:
  schedule:
    - cron: '0 * * * *'  # Every hour on the hour
  workflow_dispatch: {}   # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch PriceEmpire prices
        env:
          PRICEMPIRE_API_KEY: ${{ secrets.PRICEMPIRE_API_KEY }}
        run: node scripts/fetch-prices.mjs

      - name: Fetch SkinDeck prices
        env:
          SKINDECK_API_KEY: ${{ secrets.SKINDECK_API_KEY }}
        run: node scripts/fetch-skindeck-prices.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/lib/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/skins-data.json src/lib/prices.json src/lib/skindeck-data.json
          git commit -m "Update marketplace prices [automated]"
          git push
